<app-navbar></app-navbar>
<main class="auth-page">
  <section class="auth-card">
    <h1>Connexion</h1>

    <form (ngSubmit)="connecter()">
      <label for="identifiant">Email ou pseudo</label>
      <input
        id="identifiant"
        name="identifiant"
        [(ngModel)]="identifiant"
        (input)="validerIdentifiant()"
        required
      />
      @if (erreurIdentifiant()) {
        <p class="error">{{ erreurIdentifiant() }}</p>
      }

      <label for="motDePasse">Mot de passe</label>
      <input
        id="motDePasse"
        name="motDePasse"
        type="password"
        [(ngModel)]="motDePasse"
        (input)="validerMotDePasse()"
        required
      />
      @if (erreurMotDePasse()) {
        <p class="error">{{ erreurMotDePasse() }}</p>
      }

      @if (erreurServeur()) {
        <p class="error">{{ erreurServeur() }}</p>
      }

      <button type="submit" [disabled]="chargement()">
        {{ chargement() ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="auth-link">
      Pas encore de compte ?
      <a routerLink="/inscription">Créer un compte</a>
    </p>
  </section>
</main>

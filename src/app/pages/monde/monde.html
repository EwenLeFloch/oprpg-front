<app-navbar></app-navbar>
<main class="monde-page">
  <section class="monde-card">
    <h1>Monde</h1>

    @if (chargement()) {
      <p>Chargement...</p>
    } @else if (erreur()) {
      <p class="error">{{ erreur() }}</p>
    } @else {
      <div class="iles-grid">
        @for (ile of iles(); track ile.id) {
          <article class="ile-card" (click)="allerVersIle(ile)">
            <img [src]="ile.imagePath" [alt]="ile.nom" class="ile-image" />
            <div class="ile-info">
              <h2>{{ ile.nom }}</h2>
              <p>Niveau requis : {{ ile.niveauRequis }}</p>
            </div>
          </article>
        }
      </div>
    }
  </section>
</main>
